name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  nix:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check Nix formatting with Alejandra
        run: nix shell nixpkgs#alejandra -c alejandra --check .

      - name: Validate flake
        run: nix flake check --accept-flake-config

  stable-check:
    name: Stable Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace --locked

  feature-matrix:
    name: Feature Matrix (${{ matrix.feature_set.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature_set:
          - name: none
            flags: --no-default-features
            test_extra: ""
          - name: serde
            flags: --no-default-features --features serde
            test_extra: ""
          - name: python
            flags: --no-default-features --features python
            test_extra: -- --test-threads=1
          - name: all-features
            flags: --all-features
            test_extra: -- --test-threads=1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check / Clippy / Test / Fix
        shell: bash
        run: |
          set -euo pipefail

          FLAGS="${{ matrix.feature_set.flags }}"
          TEST_EXTRA="${{ matrix.feature_set.test_extra }}"

          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          echo "Using PYO3_PYTHON=$PYO3_PYTHON"

          eval "cargo check --workspace --all-targets $FLAGS"
          eval "cargo clippy --workspace --all-targets $FLAGS -- -D warnings"
          eval "cargo test --workspace --all-targets $FLAGS $TEST_EXTRA"
          eval "cargo fix --workspace --all-targets --allow-dirty --allow-staged --allow-no-vcs $FLAGS"
          git diff --exit-code

  lint:
    name: Lint (fmt + clippy + check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Configure PyO3 Python
        shell: bash
        run: echo "PYO3_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo test
        run: cargo test --workspace --all-targets

      - name: Binary regression runner
        run: cargo run --bin test

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --workspace --no-deps

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web WASM package
        working-directory: examples/web
        run: wasm-pack build --release --target web --out-dir pkg --out-name music21_rs_web

      - name: Build web TypeScript
        working-directory: examples/web
        run: npx --yes --package typescript@5.9.3 tsc -p tsconfig.json

      - name: Build demo site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf target/pages
          mkdir -p target/pages/chord
          mkdir -p target/pages/chords
          mkdir -p target/pages/docs
          mkdir -p target/pages/polyrhythm
          mkdir -p target/pages/tuning
          cp -R target/doc/. target/pages/docs/
          cp examples/web/help-tooltips.js target/pages/help-tooltips.js
          cp examples/web/theme.css target/pages/theme.css
          cp examples/web/theme.js target/pages/theme.js
          cp examples/web/index.html target/pages/index.html
          cp examples/web/chord/index.html target/pages/chord/index.html
          cp examples/web/chord/app.js target/pages/chord/app.js
          cp examples/web/chords/index.html target/pages/chords/index.html
          cp examples/web/chords/app.js target/pages/chords/app.js
          cp examples/web/polyrhythm/index.html target/pages/polyrhythm/index.html
          cp examples/web/polyrhythm/app.js target/pages/polyrhythm/app.js
          cp examples/web/tuning/index.html target/pages/tuning/index.html
          cp examples/web/tuning/app.js target/pages/tuning/app.js
          cp -R examples/web/pkg target/pages/pkg

      - name: Smoke check demo site
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          root = Path("target/pages")
          required_files = [
              "index.html",
              "chord/index.html",
              "chords/index.html",
              "pkg/music21_rs_web.js",
              "pkg/music21_rs_web_bg.wasm",
              "help-tooltips.js",
              "theme.css",
              "theme.js",
              "docs/music21_rs/index.html",
              "chord/app.js",
              "chords/app.js",
              "polyrhythm/index.html",
              "polyrhythm/app.js",
              "tuning/index.html",
              "tuning/app.js",
          ]

          missing = [name for name in required_files if not (root / name).is_file()]
          if missing:
              raise SystemExit(f"missing demo build output: {', '.join(missing)}")

          file_checks = {
              "index.html": ["chord/", "chords/", "polyrhythm/", "tuning/", "./theme.css", "./theme.js"],
              "theme.css": ["--accent", ":root[data-theme=\"dark\"]", ".theme-toggle"],
              "chord/index.html": ["./app.js", "../theme.css", "../chords/", "../polyrhythm/"],
              "chord/app.js": ["../help-tooltips.js", "../theme.js", "../pkg/music21_rs_web.js"],
              "chords/index.html": ["./app.js", "../theme.css", "../chord/"],
              "chords/app.js": ["../help-tooltips.js", "../theme.js", "../pkg/music21_rs_web.js"],
              "polyrhythm/index.html": ["./app.js", "../theme.css"],
              "polyrhythm/app.js": ["../help-tooltips.js", "../theme.js"],
              "tuning/index.html": ["./app.js", "../theme.css"],
              "tuning/app.js": ["../theme.js"],
          }

          for name, needles in file_checks.items():
              text = (root / name).read_text(encoding="utf-8")
              missing_needles = [needle for needle in needles if needle not in text]
              if missing_needles:
                  joined = ", ".join(missing_needles)
                  raise SystemExit(f"{name} is missing expected demo references: {joined}")
          PY

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/pages

  pages:
    name: Publish Docs
    runs-on: ubuntu-latest
    needs:
      - nix
      - stable-check
      - feature-matrix
      - lint
      - test
      - docs
    if: github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - nix
      - stable-check
      - feature-matrix
      - lint
      - test
      - docs
      - pages
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect package version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          read_version() {
            python3 - "$1" <<'PY'
          import pathlib
          import sys
          import tomllib

          print(tomllib.loads(pathlib.Path(sys.argv[1]).read_text())["package"]["version"])
          PY
          }

          current_version="$(read_version Cargo.toml)"
          previous_version=""
          base="${{ github.event.before }}"

          if [[ ! "$base" =~ ^0+$ ]] && git cat-file -e "$base:Cargo.toml" 2>/dev/null; then
            git show "$base:Cargo.toml" > /tmp/previous-Cargo.toml
            previous_version="$(read_version /tmp/previous-Cargo.toml)"
          fi

          changed=true
          if [[ -n "$previous_version" && "$current_version" == "$previous_version" ]]; then
            changed=false
          fi

          {
            echo "changed=$changed"
            echo "current_version=$current_version"
            echo "previous_version=$previous_version"
            echo "tag=v$current_version"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping release."
            exit 0
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
