name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior and expected behavior.
      placeholder: "When I run ..., I expected ... but got ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      render: shell

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "rustc 1.xx.x ..."

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / Windows 11 / macOS 15 ..."
