<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>music21-rs Chord Inspector</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #61646b;
        --line: #d9dde5;
        --panel: #ffffff;
        --soft: #f4f6f8;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --warn: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.08), transparent 32rem),
          var(--soft);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
      }

      .docs-link {
        color: var(--accent-strong);
        font-weight: 700;
        text-decoration: none;
      }

      .input-row {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) auto;
        gap: 10px;
        margin-bottom: 10px;
      }

      #chord-input {
        min-width: 0;
        height: 46px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
      }

      #analyze {
        height: 46px;
        padding: 0 18px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      #analyze:hover {
        background: var(--accent-strong);
      }

      .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 22px;
      }

      .examples button {
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 18px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      section h2 {
        margin: 0;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        font-size: 15px;
        letter-spacing: 0;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        background: var(--line);
      }

      .fact {
        min-height: 74px;
        padding: 12px;
        background: var(--panel);
      }

      .fact span,
      th {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .fact strong {
        display: block;
        margin-top: 6px;
        overflow-wrap: anywhere;
        font-size: 16px;
      }

      .list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px 16px;
      }

      .chip {
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #f9fafb;
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      td {
        font-variant-numeric: tabular-nums;
      }

      .keyboard {
        position: relative;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 2px;
        padding: 14px 16px 18px;
      }

      .key {
        height: 92px;
        border: 1px solid var(--line);
        border-radius: 0 0 5px 5px;
        background: #fff;
        color: var(--muted);
        display: flex;
        align-items: end;
        justify-content: center;
        padding-bottom: 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .key.black {
        height: 62px;
        background: #202329;
        color: #fff;
      }

      .key.active {
        border-color: var(--accent);
        box-shadow: inset 0 -6px 0 var(--accent);
        color: var(--accent-strong);
      }

      .key.black.active {
        box-shadow: inset 0 -6px 0 #2dd4bf;
        color: #99f6e4;
      }

      .error {
        display: none;
        margin: 0 0 16px;
        padding: 12px 14px;
        border: 1px solid #f3b0aa;
        border-radius: 8px;
        background: #fff3f1;
        color: var(--warn);
        font-weight: 700;
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100vw - 20px, 680px);
          padding-top: 14px;
        }

        header,
        .layout,
        .input-row,
        .facts {
          grid-template-columns: 1fr;
        }

        header {
          display: grid;
          align-items: start;
        }

        h1 {
          font-size: 26px;
        }

        #analyze {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Chord Inspector</h1>
        <a class="docs-link" href="./docs/music21_rs/index.html">Rust docs</a>
      </header>

      <form id="form" class="input-row">
        <input id="chord-input" value="C E G#" autocomplete="off" />
        <button id="analyze" type="submit">Analyze</button>
      </form>

      <div class="examples" id="examples"></div>
      <p class="error" id="error"></p>

      <div class="layout">
        <div>
          <section>
            <h2>Summary</h2>
            <div class="facts" id="facts"></div>
          </section>

          <section style="margin-top: 18px">
            <h2>Pitched Names</h2>
            <div class="list" id="pitched-names"></div>
          </section>

          <section style="margin-top: 18px">
            <h2>Pitches</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Octave</th>
                  <th>Pitch Space</th>
                  <th>Class</th>
                  <th>Alter</th>
                </tr>
              </thead>
              <tbody id="pitches"></tbody>
            </table>
          </section>
        </div>

        <div>
          <section>
            <h2>Pitch Classes</h2>
            <div class="keyboard" id="keyboard"></div>
          </section>

          <section style="margin-top: 18px">
            <h2>Unpitched Names</h2>
            <div class="list" id="common-names"></div>
          </section>
        </div>
      </div>
    </main>

    <script type="module">
      import init, { analyze_chord } from "./pkg/music21_rs_chord_web.js";

      const input = document.querySelector("#chord-input");
      const form = document.querySelector("#form");
      const error = document.querySelector("#error");
      const facts = document.querySelector("#facts");
      const pitchedNames = document.querySelector("#pitched-names");
      const commonNames = document.querySelector("#common-names");
      const pitches = document.querySelector("#pitches");
      const keyboard = document.querySelector("#keyboard");
      const examples = document.querySelector("#examples");
      const pcNames = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "Ab", "A", "Bb", "B"];
      const blackKeys = new Set([1, 3, 6, 8, 10]);

      function text(value) {
        if (value === null || value === undefined) return "Not available";
        if (Array.isArray(value)) return value.length ? value.join(", ") : "Not available";
        return String(value);
      }

      function renderChips(node, values) {
        node.replaceChildren();
        const list = values && values.length ? values : ["Not available"];
        for (const value of list) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = value;
          node.appendChild(chip);
        }
      }

      function renderFacts(data) {
        const rows = [
          ["Common name", data.common_name],
          ["Root", data.root_pitch_name],
          ["Bass", data.bass_pitch_name],
          ["Inversion", data.inversion_name ?? data.inversion],
          ["Key estimate", data.key_estimate],
          ["Forte class", data.forte_class],
          ["Normal form", data.normal_form],
          ["Interval-class vector", data.interval_class_vector],
        ];
        facts.replaceChildren();
        for (const [label, value] of rows) {
          const item = document.createElement("div");
          item.className = "fact";
          const labelNode = document.createElement("span");
          labelNode.textContent = label;
          const valueNode = document.createElement("strong");
          valueNode.textContent = text(value);
          item.append(labelNode, valueNode);
          facts.appendChild(item);
        }
      }

      function renderPitches(data) {
        pitches.replaceChildren();
        for (const pitch of data.pitches) {
          const tr = document.createElement("tr");
          const cells = [
            pitch.index + 1,
            pitch.name_with_octave || pitch.name,
            pitch.octave ?? "None",
            pitch.pitch_space.toFixed(3),
            pitch.pitch_class,
            pitch.alter.toFixed(3),
          ];
          for (const cell of cells) {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
          }
          pitches.appendChild(tr);
        }
      }

      function renderKeyboard(activeClasses) {
        const active = new Set(activeClasses);
        keyboard.replaceChildren();
        pcNames.forEach((name, index) => {
          const key = document.createElement("div");
          key.className = `key${blackKeys.has(index) ? " black" : ""}${active.has(index) ? " active" : ""}`;
          key.textContent = name;
          keyboard.appendChild(key);
        });
      }

      function render(data) {
        error.style.display = "none";
        renderFacts(data);
        renderChips(pitchedNames, data.pitched_common_names);
        renderChips(commonNames, data.common_names);
        renderPitches(data);
        renderKeyboard(data.pitch_classes);
      }

      function analyze() {
        try {
          render(analyze_chord(input.value));
        } catch (err) {
          error.textContent = err instanceof Error ? err.message : String(err);
          error.style.display = "block";
        }
      }

      for (const value of ["C E G", "C E- G", "C E G#", "G2 B2 D3 F3", ""]) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = value === "" ? "empty" : value;
        button.addEventListener("click", () => {
          input.value = value;
          analyze();
        });
        examples.appendChild(button);
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        analyze();
      });

      await init();
      analyze();
    </script>
  </body>
</html>
