<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chord Browser - music21-rs</title>
    <style>
      .toolbar {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(190px, 230px) 120px auto auto auto;
        gap: 12px;
        align-items: end;
        padding: 14px;
        margin-bottom: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-softer);
        color: var(--ink);
        font: inherit;
        padding: 8px 10px;
      }

      .range-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 6px;
        align-items: center;
      }

      .range-control span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .count {
        align-self: end;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        min-height: 40px;
        font-weight: 750;
        text-align: right;
      }

      .toggle-button {
        min-height: 40px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-softer);
        color: var(--accent-strong);
        cursor: pointer;
        font: inherit;
        font-weight: 750;
        white-space: nowrap;
      }

      .toggle-button.active,
      .toggle-button.copied,
      .toggle-button:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .inversion-buttons {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
        min-width: 0;
      }

      .resolution-links {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
        min-width: 0;
      }

      .mini-button {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        max-width: 100%;
        min-height: 28px;
        min-width: 0;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-softer);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 760;
        line-height: 1.2;
        overflow-wrap: anywhere;
        text-align: left;
        text-decoration: none;
        white-space: normal;
      }

      .mini-button:hover,
      .mini-button:focus-visible {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        overflow-wrap: anywhere;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0;
        background: var(--panel-soft);
      }

      tbody tr:hover {
        background: var(--row-hover);
      }

      .name {
        min-width: 0;
        font-weight: 800;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        min-height: 24px;
        padding: 3px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-softer);
        color: var(--ink);
        font-size: 12px;
        font-weight: 650;
        line-height: 1.25;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .pitch-list,
      .mono {
        font-variant-numeric: tabular-nums;
      }

      .pitch-list {
        font-weight: 760;
        white-space: normal;
      }

      .mono {
        color: var(--mono);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace,
          monospace;
        font-size: 13px;
      }

      .symbol {
        font-weight: 800;
        white-space: normal;
      }

      .key-estimate {
        color: var(--strong-muted);
        font-size: 13px;
        font-weight: 760;
      }

      .roman-numeral {
        color: var(--ink);
        font-size: 13px;
        font-weight: 760;
      }

      .help {
        position: relative;
        display: inline-grid;
        width: 18px;
        height: 18px;
        margin-left: 5px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: var(--panel-softer);
        color: var(--muted);
        cursor: help;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        vertical-align: middle;
      }

      .help::after {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        z-index: 5;
        width: 260px;
        max-width: min(260px, calc(100vw - 40px));
        padding: 10px 12px;
        border-radius: 6px;
        background: var(--tooltip-bg);
        color: var(--tooltip-ink);
        content: attr(data-help);
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
        opacity: 0;
        pointer-events: none;
        text-transform: none;
        transform: translateX(-50%) translateY(-2px);
        transition:
          opacity 120ms ease,
          transform 120ms ease;
        white-space: normal;
      }

      .help:hover::after,
      .help:focus-visible::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .error {
        display: none;
        margin: 12px 0 0;
        color: var(--danger);
        font-weight: 750;
      }

      @media (max-width: 920px) {
        .toolbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .count {
          justify-content: flex-start;
          text-align: left;
        }

        colgroup,
        thead {
          display: none;
        }

        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }

        tbody tr {
          padding: 8px 0;
          border-bottom: 1px solid var(--line);
        }

        tbody tr:last-child {
          border-bottom: 0;
        }

        th,
        td {
          border-bottom: 0;
        }

        td {
          display: grid;
          grid-template-columns: 104px minmax(0, 1fr);
          gap: 10px;
          padding: 7px 12px;
        }

        td::before {
          color: var(--muted);
          content: "";
          font-size: 11px;
          font-weight: 800;
          text-transform: uppercase;
        }

        td:nth-child(1)::before {
          content: "Name";
        }

        td:nth-child(2)::before {
          content: "Symbol";
        }

        td:nth-child(3)::before {
          content: "Key estimate";
        }

        td:nth-child(4)::before {
          content: "Roman";
        }

        td:nth-child(5)::before {
          content: "Aliases";
        }

        td:nth-child(6)::before {
          content: "Class";
        }

        td:nth-child(7)::before {
          content: "Pitches";
        }

        td:nth-child(8)::before {
          content: "Inversions";
        }

        td:nth-child(9)::before {
          content: "Resolutions";
        }

        td:nth-child(10)::before {
          content: "Normal Form";
        }

        td:nth-child(11)::before {
          content: "Interval Vector";
        }

      }

      @media (max-width: 760px) {
        .shell {
          width: min(100vw - 24px, 720px);
          padding-top: 16px;
        }

        header,
        .toolbar {
          grid-template-columns: 1fr;
        }

        header {
          display: grid;
          align-items: start;
        }

        .top-links {
          justify-content: start;
          gap: 8px;
          width: 100%;
        }

        .top-links a {
          display: inline-flex;
          align-items: center;
          min-height: 34px;
          padding: 0 10px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--panel);
        }

        h1 {
          font-size: 26px;
        }

        .toggle-button {
          width: 100%;
        }

        .count {
          justify-content: flex-start;
          text-align: left;
        }
      }

      @media (max-width: 420px) {
        td {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        td::before {
          font-size: 10px;
        }
      }
    </style>
    <link rel="stylesheet" href="../theme.css" />
  </head>
  <body class="page-chords">
    <main class="shell">
      <header>
        <div class="title-row">
          <a class="home-link" href="../">Home</a>
          <h1>Chord Browser</h1>
        </div>
        <nav class="top-links">
          <a href="../chord/">Chord Inspector</a>
          <a href="../polyrhythm/">Polyrhythm</a>
          <a href="../tuning/">Tuning</a>
          <a href="../docs/music21_rs/index.html">Rust docs</a>
        </nav>
      </header>

      <section class="toolbar panel">
        <label>
          Search
          <input id="search" type="search" placeholder="major seventh, 4-27, [0, 2, 5]" />
        </label>
        <label>
          Notes
          <span class="range-control">
            <select id="min-cardinality" aria-label="Minimum notes">
            </select>
            <span>to</span>
            <select id="max-cardinality" aria-label="Maximum notes">
            </select>
          </span>
        </label>
        <label>
          Root
          <select id="root">
            <option value="0">C</option>
            <option value="1">Db</option>
            <option value="2">D</option>
            <option value="3">Eb</option>
            <option value="4">E</option>
            <option value="5">F</option>
            <option value="6">F#</option>
            <option value="7">G</option>
            <option value="8">Ab</option>
            <option value="9">A</option>
            <option value="10">Bb</option>
            <option value="11">B</option>
          </select>
        </label>
        <button id="named-only" class="toggle-button" type="button" aria-pressed="false">
          Named only
        </button>
        <button id="share-filters" class="toggle-button" type="button">
          Copy link
        </button>
        <div class="count" id="count">Loading...</div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width: 13%" />
              <col style="width: 13%" />
              <col style="width: 8%" />
              <col style="width: 8%" />
              <col style="width: 8%" />
              <col style="width: 6%" />
              <col style="width: 9%" />
              <col style="width: 10%" />
              <col style="width: 12%" />
              <col style="width: 6%" />
              <col style="width: 7%" />
            </colgroup>
            <thead>
              <tr>
                <th>Name</th>
                <th>Symbol</th>
                <th>Key estimate</th>
                <th>Roman</th>
                <th>Aliases</th>
                <th>
                  Class
                  <button
                    class="help"
                    type="button"
                    aria-label="Class: Forte class for this transposition-normal chord type."
                    data-help="Forte class for this transposition-normal chord type. A and B suffixes distinguish inversion-related forms when music21 gives them separate names."
                  >?</button>
                </th>
                <th>Pitches</th>
                <th>Inversions</th>
                <th>Resolutions</th>
                <th>
                  Normal Form
                  <button
                    class="help"
                    type="button"
                    aria-label="Normal Form: the pitch classes rotated into their most compact ascending order."
                    data-help="The pitch classes rotated into their most compact ascending order, transposed so the first pitch class is 0."
                  >?</button>
                </th>
                <th>
                  Interval Vector
                  <button
                    class="help"
                    type="button"
                    aria-label="Interval Vector: six counts of unordered interval classes in the pitch-class set."
                    data-help="A six-number count of unordered interval classes inside the pitch-class set, from minor seconds through tritones."
                  >?</button>
                </th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
      <p class="error" id="error"></p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
